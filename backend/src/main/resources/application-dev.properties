# suppress inspection "UnusedProperty" for whole file
quarkus.compose.devservices.files=../docker-compose.yaml
quarkus.compose.devservices.project-name=quantum-health
# Use password grant for Dev UI OIDC testing — no redirect URIs needed,
# so startup no longer attempts to connect to localhost:4200 (Angular).
quarkus.oidc.devui.grant.type=password
quarkus.oidc.credentials.secret=backend-secret