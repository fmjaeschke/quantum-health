databaseChangeLog:
  - changeSet:
      id: 0002-create-appointment
      author: quantum
      changes:
        - createTable:
            tableName: qh_appointment
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: patient_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: patient_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: doctor_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: doctor_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: scheduled_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_appointment_doctor_id
            tableName: qh_appointment
            columns:
              - column:
                  name: doctor_id
        - createIndex:
            indexName: idx_appointment_patient_id
            tableName: qh_appointment
            columns:
              - column:
                  name: patient_id
