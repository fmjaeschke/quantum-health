# OIDC
quarkus.oidc.client-id=quantum-health-backend
quarkus.oidc.application-type=service

# Keycloak Admin Client
quarkus.keycloak.admin-client.client-id=admin-cli
quarkus.keycloak.admin-client.username=${KEYCLOAK_ADMIN_USERNAME}
quarkus.keycloak.admin-client.password=${KEYCLOAK_ADMIN_PASSWORD}
quarkus.keycloak.admin-client.grant-type=PASSWORD

# App config
quantum-health.keycloak.realm=quantum-health

# Jackson — ISO 8601 strings, not timestamps
quarkus.jackson.write-dates-as-timestamps=false

# Quartz — JDBC-backed clustered scheduler so only one node fires each job
quarkus.quartz.store-type=jdbc-cmt
quarkus.quartz.clustered=true
quarkus.quartz.cluster-checkin-interval=20000
quarkus.quartz.misfire-policy."prescription-expiry"=fire-now

# Prescription expiry — how long an issued prescription remains valid before expiring
quantum-health.prescription.expiry-after=P30D

# Billing — flat consultation fee used as an invoice's total amount (no procedure catalog yet)
quantum-health.billing.consultation-fee=150.00

# Liquibase
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.yaml
# Hibernate — validate schema against entities at startup
quarkus.hibernate-orm.schema-management.strategy=validate
# Use Hibernate's own JSON format mapper to avoid conflicts with REST-layer Jackson customisations
quarkus.hibernate-orm.mapping.format.global=ignore
