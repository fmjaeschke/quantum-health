quarkus.compose.devservices.files=../docker-compose.yaml
quarkus.compose.devservices.project-name=quantum-health
quarkus.compose.devservices.reuse-project-for-tests=true
quarkus.oidc.tenant-enabled=false
# Keycloak Admin Client — adapter is never called in tests (use cases are mocked)
quarkus.keycloak.admin-client.server-url=http://localhost:8180
quarkus.keycloak.admin-client.realm=master
quarkus.keycloak.admin-client.username=${KEYCLOAK_ADMIN_USERNAME:admin}
quarkus.keycloak.admin-client.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
quarkus.jacoco.excludes=**/*_.class,**/_*.class
